packages:
  - apps/*
  - packages/*
  - tools/*

catalog:
  "@types/node": ^24
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@0.1.15
  vite-plus: ^0.1.15
  vitest: npm:@voidzero-dev/vite-plus-test@0.1.15

catalogMode: prefer
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
